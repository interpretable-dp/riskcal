# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        ext: ["cython", "no-cython"]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
      - name: Install dependencies
        if: matrix.ext == 'cython'
        run: uv sync --dev
      - name: Install dependencies (no Cython)
        if: matrix.ext == 'no-cython'
        env:
          RISKCAL_NO_COMPILE: "1"
        run: uv sync --dev
      - name: Assert Cython is available
        if: matrix.ext == 'cython'
        run: uv run python -c "from riskcal.analysis.rdp import is_cython_available; assert is_cython_available(), 'Cython extension not loaded'"
      - name: Assert Cython is unavailable
        if: matrix.ext == 'no-cython'
        run: uv run python -c "from riskcal.analysis.rdp import is_cython_available; assert not is_cython_available(), 'Cython extension incorrectly is loaded'"
      - name: Run tests
        run: uv run pytest

  install:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        ext: ["cython", "no-cython"]

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      - name: Install with Cython
        if: matrix.ext == 'cython'
        run: pip install .
      - name: Install without Cython
        if: matrix.ext == 'no-cython'
        env:
          RISKCAL_NO_COMPILE: "1"
        run: pip install .
      - name: Assert is_cython_available() == True
        if: matrix.ext == 'cython'
        run: python -c "from riskcal.analysis.rdp import is_cython_available; assert is_cython_available(), 'Expected Cython extension'"
      - name: Assert is_cython_available() == False
        if: matrix.ext == 'no-cython'
        run: python -c "from riskcal.analysis.rdp import is_cython_available; assert not is_cython_available(), 'Expected pure Python fallback'"

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
      - name: Install dependencies with docs group
        run: uv sync --group docs
      - name: Build documentation
        run: uv run sphinx-build -b html -W --keep-going docs/source docs/_build/html
      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/_build/html
