name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Pre-download virtualenv for cibuildwheel
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            CACHE_DIR="$HOME/Library/Caches/cibuildwheel"
          else
            CACHE_DIR="$HOME/.cache/cibuildwheel"
          fi
          mkdir -p "$CACHE_DIR"
          curl -fsSL "https://raw.githubusercontent.com/pypa/get-virtualenv/20.30.0/public/virtualenv.pyz" \
            -o "$CACHE_DIR/virtualenv-20.30.0.pyz"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build sdist
        run: uv build --sdist

      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - name: Publish
        run: uv publish
